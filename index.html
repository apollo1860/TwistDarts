<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dartscorer Pro</title>

<style>
body{margin:0;font-family:Segoe UI;background:#0b1a1f;color:white;}
.container{display:flex;height:100vh;}
.left{width:50%;display:flex;}
.player{flex:1;padding:30px;display:flex;flex-direction:column;justify-content:center;transition:.3s;}
.active{opacity:1;}
.inactive{opacity:.2;filter:grayscale(1);}
.p1{background:#ff4d2d;}
.p2{background:#ff9a1f;}
.score{font-size:100px;font-weight:900;}
.right{width:50%;display:flex;flex-direction:column;justify-content:center;align-items:center;}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;width:80%;}
.key{padding:30px;font-size:30px;background:#111;border-radius:20px;text-align:center;}
.display{display:flex;gap:10px;margin-bottom:20px;}
.display input{padding:20px;font-size:25px;}
button{padding:15px;font-size:18px;margin:5px;}
.popup{position:fixed;inset:0;display:none;justify-content:center;align-items:center;background:#000a;}
.popup div{background:#111;padding:20px;border-radius:20px;}
.setup{position:fixed;inset:0;display:flex;justify-content:center;align-items:center;background:#000a;}
.setup-box{background:#111;padding:30px;border-radius:20px;text-align:center;}
</style>
</head>

<body>

<div class="setup" id="setup">
<div class="setup-box">
<h2>Setup</h2>
First to: <input id="legsInput" type="number" min="1" max="10" value="3"><br><br>
<select id="mode">
<option value="human">2 Spieler</option>
<option value="bot">gegen Dartbot</option>
</select><br><br>
<button onclick="start()">Start</button>
</div>
</div>

<div class="container">

<div class="left">
<div id="p0" class="player p1 active">
<h2>Spieler 1</h2>
<div class="score" id="score0">0</div>
Avg: <span id="avg0">0</span><br>
Darts (Leg): <span id="darts0">0</span><br>
Legs: <span id="legs0">0</span>
</div>

<div id="p1" class="player p2 inactive">
<h2 id="name1">Spieler 2</h2>
<div class="score" id="score1">0</div>
Avg: <span id="avg1">0</span><br>
Darts (Leg): <span id="darts1">0</span><br>
Legs: <span id="legs1">0</span>
</div>
</div>

<div class="right">

<div class="display">
<input id="input">
<button onclick="submit()">OK</button>
<button onclick="undo()">↩</button>
</div>

<div class="keypad">
<div class="key" onclick="add(1)">1</div>
<div class="key" onclick="add(2)">2</div>
<div class="key" onclick="add(3)">3</div>
<div class="key" onclick="add(4)">4</div>
<div class="key" onclick="add(5)">5</div>
<div class="key" onclick="add(6)">6</div>
<div class="key" onclick="add(7)">7</div>
<div class="key" onclick="add(8)">8</div>
<div class="key" onclick="add(9)">9</div>
<div class="key" onclick="clearInput()">C</div>
<div class="key" onclick="add(0)">0</div>
<div class="key" onclick="back()">⌫</div>
</div>

</div>
</div>

<div class="popup" id="popup">
<div>
<h3>Checkout Darts?</h3>
<button onclick="finish(1)">1</button>
<button onclick="finish(2)">2</button>
<button onclick="finish(3)">3</button>
</div>
</div>

<script>
let s;
let history=[];

const BOT_SCORES=[22,25,24,26,36,38,39,40,41,43,45,46,47,48,60,64,66,80,81,83,85,90,93,96,100,121,123,125,140,180];

function clone(){ return JSON.parse(JSON.stringify(s)); }

function start(){
s={
target:Math.max(1,Math.min(10,+legsInput.value)),
player:0,
phase:"pre",
bot:mode.value==="bot",
preScore:[0,0],
preDarts:[0,0],
remaining:[0,0],
totalScore:[0,0],
totalDarts:[0,0],
legDarts:[0,0],
legs:[0,0]
};
history=[];
if(s.bot) name1.textContent="Dartbot";
setup.style.display="none";
render();
botTurn();
}

function undo(){
if(history.length===0) return;
s=history.pop();
render();
}

function save(){ history.push(clone()); }

function avg(p){
if(!s.totalDarts[p]) return "0.00";
return ((s.totalScore[p]/s.totalDarts[p])*3).toFixed(2);
}

function setActive(){
p0.classList.toggle("active",s.player===0);
p1.classList.toggle("active",s.player===1);
p0.classList.toggle("inactive",s.player!==0);
p1.classList.toggle("inactive",s.player!==1);
}

function render(){
score0.textContent=s.remaining[0];
score1.textContent=s.remaining[1];
darts0.textContent=s.legDarts[0];
darts1.textContent=s.legDarts[1];
avg0.textContent=avg(0);
avg1.textContent=avg(1);
legs0.textContent=s.legs[0];
legs1.textContent=s.legs[1];
setActive();
}

function add(n){input.value+=n;}
function clearInput(){input.value="";}
function back(){input.value=input.value.slice(0,-1);}

function submit(){
let pts=+input.value;
if(pts<0||pts>180)return;

save();

if(s.phase==="pre"){
s.preScore[s.player]+=pts;
s.preDarts[s.player]+=3;
s.totalScore[s.player]+=pts;
s.totalDarts[s.player]+=3;
s.player=1-s.player;

if(s.preDarts[0]>=9 && s.preDarts[1]>=9){
s.remaining[0]=s.preScore[1];
s.remaining[1]=s.preScore[0];
s.phase="leg";
s.player=0;
}

} else {

let newScore=s.remaining[s.player]-pts;

// BUST RULES
if(newScore<0 || newScore===1){
s.player=1-s.player;
render();
return;
}

if(newScore===0){
window.tmp=pts;
popup.style.display="flex";
return;
}

s.remaining[s.player]=newScore;
s.totalScore[s.player]+=pts;
s.totalDarts[s.player]+=3;
s.legDarts[s.player]+=3;

s.player=1-s.player;
}

input.value="";
render();
botTurn();
}

function finish(d){
popup.style.display="none";
let p=s.player;

s.remaining[p]=0;
s.totalScore[p]+=window.tmp;
s.totalDarts[p]+=d;
s.legDarts[p]+=d;

s.legs[p]++;

if(s.legs[p]>=s.target){
alert("Gewinner: "+(p===1&&s.bot?"Dartbot":"Spieler "+(p+1)));
location.reload();
return;
}

s.phase="pre";
s.preScore=[0,0];
s.preDarts=[0,0];
s.remaining=[0,0];
s.legDarts=[0,0];
s.player=0;

render();
botTurn();
}

function botTurn(){
if(!s.bot || s.player!==1) return;

setTimeout(()=>{

let pts;

if(s.phase==="pre"){
pts=BOT_SCORES[Math.floor(Math.random()*BOT_SCORES.length)];
} else {

let rest=s.remaining[1];
let chance=0;

if(rest>=100&&rest<=170) chance=0.05;
else if(rest>=60&&rest<=99) chance=0.10;
else if(rest>=40&&rest<=59) chance=0.20;
else if(rest>=2&&rest<=39) chance=0.40;

if(Math.random()<chance && rest!==1){
window.tmp=rest;
finish(Math.floor(Math.random()*3)+1);
return;
}

let possible=BOT_SCORES.filter(x=>x<=rest && rest-x!==1);
pts=possible.length?possible[Math.floor(Math.random()*possible.length)]:0;
}

input.value=pts;
submit();

},700);
}
</script>

</body>
</html>
